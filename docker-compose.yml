version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - '5051:5051'
    volumes:
      - ./videos:/app/videos
      - ./audios:/app/audios
      - ./jsons:/app/jsons
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434/api/embed
      - BACKEND_PORT=5051
    depends_on: []

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - '4173:4173'
    depends_on:
      - backend
